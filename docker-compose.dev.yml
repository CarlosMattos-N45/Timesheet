# docker-compose.dev.yml
# Servicos de dependencia externa para desenvolvimento.
# Unico servico: Mailhog (servidor SMTP fake) — sink de e-mails durante dev/teste.
# O banco SQLite + SQLCipher e embarcado no processo Python, sem container.

services:
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: timesheet-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s
    restart: unless-stopped
    volumes:
      - mailhog-data:/maildir

volumes:
  mailhog-data:
    name: timesheet-mailhog-data
