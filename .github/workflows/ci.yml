name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  api:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install -e ".[dev]"
          pip install pytest-cov
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy --strict app
      - name: Tests + coverage (>= 80% per Spec §9)
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  web:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Format check
        run: npm run format:check
      - name: Tests + coverage
        run: npm test -- --run --coverage

  agent:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore Timesheet.Agent.sln
      - name: Format check
        run: dotnet format Timesheet.Agent.sln --verify-no-changes --no-restore
      - name: Build
        run: dotnet build Timesheet.Agent.sln -c Debug --no-restore
      - name: Tests + coverage (Domain + Infra per Spec §9)
        run: dotnet test Timesheet.Agent.sln -c Debug --no-build --collect:"XPlat Code Coverage"
