name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: "e2e-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install backend deps
        run: pip install -e ".[dev]"
        working-directory: apps/api

      - name: Install frontend deps
        run: npm ci
        working-directory: apps/web

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Start Mailhog
        shell: pwsh
        run: |
          docker compose -f docker-compose.dev.yml up -d mailhog
          $max = 30
          for ($i = 1; $i -le $max; $i++) {
            $state = (docker inspect -f '{{.State.Health.Status}}' timesheet-mailhog 2>$null)
            if ($state -eq 'healthy') { Write-Host '[mailhog] healthy'; exit 0 }
            Start-Sleep -Seconds 1
          }
          Write-Error '[mailhog] nao ficou healthy em 30s'; exit 1

      - name: Clean e2e db
        shell: pwsh
        run: if (Test-Path apps/api/data/e2e.sqlite) { Remove-Item apps/api/data/e2e.sqlite -Force }

      - name: Run Playwright E2E
        run: npm run e2e
        working-directory: apps/web
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

      - name: Stop Mailhog
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
